<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReviewLens</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div id="header-left">
      <svg id="logo-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#9333ea"/>
            <stop offset="100%" stop-color="#3b82f6"/>
          </linearGradient>
        </defs>
        <circle cx="7.5" cy="7.5" r="6" stroke="url(#logo-grad)" stroke-width="1.5"/>
        <circle cx="7.5" cy="7.5" r="2.5" fill="url(#logo-grad)"/>
        <line x1="12" y1="12" x2="16" y2="16" stroke="url(#logo-grad)" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span id="logo">ReviewLens</span>
    </div>
    <div id="header-meta">
      <span id="total-count" class="meta-chip" title="Total reviews scraped"></span>
    </div>
  </header>

  <!-- Loading state with skeleton -->
  <div id="loading-state" class="center-state">
    <div class="skel-group">
      <div class="skel skel-title"></div>
      <div class="skel skel-title-short"></div>
    </div>
    <div class="skel-group skel-card">
      <div class="skel-rating-row">
        <div class="skel skel-number"></div>
        <div class="skel skel-stars"></div>
      </div>
      <div class="skel skel-bar"></div>
      <div class="skel skel-bar skel-bar--80"></div>
      <div class="skel skel-bar skel-bar--60"></div>
      <div class="skel skel-bar skel-bar--40"></div>
      <div class="skel skel-bar skel-bar--25"></div>
    </div>
    <div class="skel-footer">
      <div class="spinner"></div>
      <p>Loading reviews…</p>
    </div>
  </div>

  <!-- Error state -->
  <div id="error-state" class="center-state hidden">
    <svg class="state-icon" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 4L32 30H4L18 4Z" stroke="#f87171" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="18" y1="15" x2="18" y2="22" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="18" cy="26" r="1.2" fill="#f87171"/>
    </svg>
    <p id="error-msg"></p>
  </div>

  <!-- Main content (hidden until data ready) -->
  <main id="main" class="hidden">

    <!-- Product title -->
    <div id="product-title-wrap">
      <p id="product-title"></p>
    </div>

    <!-- Stats card -->
    <section class="card" id="stats-card">
      <div id="rating-row">
        <span id="overall-rating"></span>
        <div id="stars-display"></div>
        <span id="review-date-range" class="muted"></span>
      </div>
      <div id="breakdown"></div>
    </section>

    <!-- Background loading progress -->
    <div id="load-progress" class="hidden">
      <span id="load-progress-text"></span>
    </div>

    <!-- Summary section -->
    <section class="card" id="summary-card">
      <div id="summary-header">
        <span class="section-title">AI Summary</span>
        <button id="refresh-summary-btn" class="icon-btn" title="Regenerate summary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.5 2.5A6 6 0 1 1 9 1.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <polyline points="9,1 9,4 12,4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div id="summary-content">
        <button id="gen-summary-btn" class="primary-btn">Generate Summary</button>
      </div>
    </section>

    <!-- Suggested questions -->
    <section id="suggestions-section">
      <p class="section-title">Suggested questions</p>
      <div id="suggestions"></div>
    </section>

    <!-- Rating filter -->
    <div id="filter-tabs">
      <button class="filter-tab active" data-filter="all">All reviews</button>
      <button class="filter-tab" data-filter="1-2">1–2 ★</button>
      <button class="filter-tab" data-filter="4-5">4–5 ★</button>
    </div>

    <!-- Chat -->
    <section id="chat-section">
      <div id="messages"></div>
    </section>

  </main>

  <!-- Input bar (always visible once main is shown) -->
  <div id="input-bar" class="hidden">
    <div id="input-wrap">
      <textarea id="chat-input" placeholder="Ask anything about this product…" rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="panel.js"></script>
</body>
</html>
